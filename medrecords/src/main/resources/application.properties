spring.application.name=medrecords

# MongoDB — set MONGODB_URI env var in production (Railway), falls back to local
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/medrecords}
spring.data.mongodb.database=medrecords

# JWT — set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:medrecords-dev-secret-change-in-production}
jwt.expiration=86400000

# Server port — Railway sets PORT automatically
server.port=${PORT:8080}

# Disable static resource serving so all requests go to REST controllers
spring.web.resources.add-mappings=false
